<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 음성 스토리북 시리즈 | HiJean Kim</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    background: linear-gradient(180deg, #fff6e9 0%, #ffe9d6 100%);
    color: #4a3728;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 2rem 4% 4rem;
  }
  :root {
    --mom: #7c5cbf; --ink: #4a3728; --muted: #8a7360;
    --card: #fffaf3; --border: rgba(124,92,191,0.2);
  }
  .top-bar { width: 100%; max-width: 760px; margin-bottom: 1.5rem; }
  .back-link { color: var(--mom); text-decoration: none; font-size: 0.9rem; font-weight: 600; }
  .back-link:hover { text-decoration: underline; }

  .header { text-align: center; margin-bottom: 2.5rem; }
  .tag {
    display: inline-block; font-size: 0.75rem; letter-spacing: 2px;
    text-transform: uppercase; color: #ff8a3d; margin-bottom: 0.5rem; font-weight: 700;
  }
  .title { font-size: clamp(1.6rem, 4vw, 2.3rem); font-weight: 800; }
  .sub { color: var(--muted); margin-top: 0.5rem; font-size: 0.95rem; }

  .episodes {
    width: 100%; max-width: 760px;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
  }
  .episode-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 24px;
    padding: 1.75rem; text-decoration: none; color: inherit;
    box-shadow: 0 12px 40px rgba(124,92,191,0.12);
    transition: transform 0.25s, box-shadow 0.25s;
    display: block;
  }
  .episode-card:hover { transform: translateY(-6px); box-shadow: 0 18px 50px rgba(124,92,191,0.2); }
  .episode-num {
    font-size: 0.72rem; letter-spacing: 1.5px; text-transform: uppercase;
    color: #ff8a3d; font-weight: 700; margin-bottom: 0.5rem;
  }
  .episode-icon { font-size: 2.2rem; margin-bottom: 0.75rem; display: block; }
  .episode-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 0.6rem; }
  .episode-desc { font-size: 0.9rem; color: var(--muted); line-height: 1.55; }

  @media (max-width: 480px) {
    body { padding: 1.25rem 3% 3rem; }
  }
</style>
</head>
<body>

  <div class="top-bar">
    <a class="back-link" href="index.html">← 포트폴리오로 돌아가기</a>
  </div>

  <div class="header">
    <span class="tag">AI Storybook Series</span>
    <h1 class="title">지우의 하루 이야기</h1>
    <p class="sub">두 목소리로 읽어주는 5살 아이의 생활습관 스토리북</p>
  </div>

  <div class="episodes">
    <a class="episode-card" href="storybook-breakfast.html">
      <div class="episode-num">1화</div>
      <span class="episode-icon">🥕</span>
      <div class="episode-title">시금치 당근 실랑이</div>
      <p class="episode-desc">
        아침 식탁에서 시금치와 당근을 거부하는 지우와 엄마의
        실랑이, 그리고 놀이로 풀어가는 이야기.
      </p>
    </a>
    <a class="episode-card" href="storybook-toothbrush.html">
      <div class="episode-num">2화</div>
      <span class="episode-icon">🪥</span>
      <div class="episode-title">뽀득뽀득 양치 대작전</div>
      <p class="episode-desc">
        잠자기 전 양치질을 하기 싫어하는 지우가 충치 벌레
        이야기와 30초 게임으로 마음을 바꾸는 이야기.
      </p>
    </a>
  </div>

</body>
</html>
